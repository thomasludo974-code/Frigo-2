<script type="module">
  // 🔥 IMPORT FIREBASE
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    deleteDoc,
    doc,
    updateDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ⚠️ CONFIGURATION FIREBASE
  const firebaseConfig = {
  apiKey: "AIzaSyCy7Csyy5KRJBiMbVER5E4knayzDuz4cso",
  authDomain: "frigo-bf9f2.firebaseapp.com",
  projectId: "frigo-bf9f2",
  storageBucket: "frigo-bf9f2.firebasestorage.app",
  messagingSenderId: "658029751960",
  appId: "1:658029751960:web:1fda5041c98cb042286aed"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── Configuration ──
  const CATEGORIES = {
    fridge: [
      { value: 'viande',   label: '🥩 Viande' },
      { value: 'poisson',  label: '🐟 Poisson' },
      { value: 'legumes',  label: '🥦 Légumes' },
      { value: 'fruits',   label: '🍎 Fruits' },
      { value: 'laitier',  label: '🧀 Produits laitiers' },
      { value: 'boissons', label: '🥤 Boissons' },
      { value: 'plats',    label: '🍱 Plats préparés' },
      { value: 'sauces',   label: '🫙 Sauces & condiments' },
      { value: 'autre_f',  label: '📦 Autre' },
    ],
    pantry: [
      { value: 'cereales',  label: '🌾 Céréales & féculents' },
      { value: 'legumes_s', label: '🥫 Légumes en conserve' },
      { value: 'legumineuses', label: '🫘 Légumineuses' },
      { value: 'farine',    label: '🥣 Farines & sucres' },
      { value: 'huiles',    label: '🫒 Huiles & vinaigres' },
      { value: 'epices',    label: '🌶️ Épices & herbes' },
      { value: 'biscuits',  label: '🍪 Biscuits & snacks' },
      { value: 'boites',    label: '🥡 Plats en conserve' },
      { value: 'pates',     label: '🍝 Pâtes & riz' },
      { value: 'confiture', label: '🍯 Confitures & miels' },
      { value: 'cafe_the',  label: '☕ Café, thé & infusions' },
      { value: 'autre_p',   label: '📦 Autre' },
    ],
  };

  const CATEGORY_LABELS = {};
  [...CATEGORIES.fridge, ...CATEGORIES.pantry].forEach(c => { CATEGORY_LABELS[c.value] = c.label; });

  // ── État Global ──
  let products = [];
  let activeFilter = 'all';
  let activeLocation = 'fridge';
  let searchQuery = '';
  let editingId = null; // Stocke l'ID du produit en cours de modification

  // ── Utilitaires ──
  const daysUntil = (d) => d ? Math.round((new Date(d).setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / 86400000) : Infinity;
  const getStatus = (p) => {
    const d = daysUntil(p.date);
    return d < 0 ? 'expired' : d <= 3 ? 'soon' : 'ok';
  };
  const formatDate = (d) => d ? d.split('-').reverse().join('/') : '—';
  const escHtml = (str) => String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]));
  
  const highlight = (text) => {
    if (!searchQuery) return escHtml(text);
    const re = new RegExp(`(${escHtml(searchQuery).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return escHtml(text).replace(re, '<mark>$1</mark>');
  };

  // ── Rendu ──
  function updateBadges() {
    document.getElementById('badge-fridge').textContent = products.filter(p => (p.location || 'fridge') === 'fridge').length;
    document.getElementById('badge-pantry').textContent = products.filter(p => p.location === 'pantry').length;
  }

  function render() {
    const container = document.getElementById('product-list');
    document.getElementById('item-count').textContent = `${products.length} produit${products.length > 1 ? 's' : ''}`;
    updateBadges();

    let visible = products.filter(p => (p.location || 'fridge') === activeLocation);
    if (activeFilter !== 'all') visible = visible.filter(p => getStatus(p) === activeFilter);
    
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      visible = visible.filter(p => p.name.toLowerCase().includes(q) || (CATEGORY_LABELS[p.category] || '').toLowerCase().includes(q));
    }

    const priority = { expired: 0, soon: 1, ok: 2, '': 3 };
    visible.sort((a, b) => priority[getStatus(a)] - priority[getStatus(b)] || daysUntil(a.date) - daysUntil(b.date));

    if (visible.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="emoji">Empty</div><p>Rien ici !</p></div>`;
      return;
    }

    container.innerHTML = visible.map(p => {
      const status = getStatus(p);
      const d = daysUntil(p.date);
      const label = status === 'expired' ? `Périmé (${Math.abs(d)}j)` : status === 'soon' ? `Expire dans ${d}j` : '';
      
      return `
        <div class="product-card ${status}" data-id="${p.id}">
          <div class="product-info">
            <div class="product-name">${highlight(p.name)}</div>
            <div class="product-meta">
              <span class="tag category">${CATEGORY_LABELS[p.category] || '—'}</span>
              <span class="tag exp-badge">📅 ${formatDate(p.date)}</span>
              ${label ? `<span class="status-label">${label}</span>` : ''}
            </div>
          </div>
          <div class="product-controls">
            <div class="qty-controls">
              <button class="qty-btn" data-action="dec" data-id="${p.id}">−</button>
              <span class="qty-value">${p.qty}</span>
              <button class="qty-btn" data-action="inc" data-id="${p.id}">+</button>
            </div>
            <div style="display:flex; gap:5px; margin-top:5px;">
              <button class="btn-delete" style="border-color:var(--accent); color:var(--accent)" data-action="edit" data-id="${p.id}">✏️ Modifier</button>
              <button class="btn-delete" data-action="del" data-id="${p.id}">🗑</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ── Sync Temps Réel ──
  onSnapshot(collection(db, "frigo"), (snapshot) => {
    products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    render();
  });

  // ── Sauvegarde (Ajout ou Edition) ──
  async function handleSave() {
    const name = document.getElementById('input-name').value.trim();
    const qty = parseInt(document.getElementById('input-qty').value, 10);
    const date = document.getElementById('input-date').value;
    const category = document.getElementById('input-category').value;
    const location = document.getElementById('input-location').value;

    if (!name || isNaN(qty)) return;

    const payload = { name, qty, date, category, location };

    if (editingId) {
      // MODE MODIFICATION
      await updateDoc(doc(db, "frigo", editingId), payload);
      editingId = null;
      document.getElementById('btn-add').textContent = "Ajouter";
      document.getElementById('btn-add').style.background = "var(--accent)";
    } else {
      // MODE AJOUT
      await addDoc(collection(db, "frigo"), payload);
    }

    // Reset formulaire
    document.getElementById('input-name').value = '';
    document.getElementById('input-qty').value = '1';
    document.getElementById('input-date').value = '';
    document.getElementById('input-name').focus();
  }

  // ── Actions Event Delegation ──
  document.getElementById('product-list').addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const { action, id } = btn.dataset;
    const item = products.find(p => p.id === id);
    const ref = doc(db, "frigo", id);

    if (action === 'inc') await updateDoc(ref, { qty: item.qty + 1 });
    else if (action === 'dec') item.qty > 1 ? await updateDoc(ref, { qty: item.qty - 1 }) : await deleteDoc(ref);
    else if (action === 'del') if(confirm('Supprimer ?')) await deleteDoc(ref);
    else if (action === 'edit') {
      // Charger les données dans le formulaire
      editingId = id;
      document.getElementById('input-name').value = item.name;
      document.getElementById('input-qty').value = item.qty;
      document.getElementById('input-date').value = item.date || "";
      document.getElementById('input-location').value = item.location || "fridge";
      
      // Mettre à jour les catégories selon le lieu
      populateCategorySelect(item.location || "fridge");
      document.getElementById('input-category').value = item.category || "";
      
      // Changer le style du bouton pour indiquer l'édition
      const saveBtn = document.getElementById('btn-add');
      saveBtn.textContent = "Enregistrer les modifications";
      saveBtn.style.background = "#f5a623"; // Orange pour l'édition
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });

  // ── Filtres et Logique UI ──
  document.getElementById('btn-add').addEventListener('click', handleSave);

  function populateCategorySelect(loc) {
    const sel = document.getElementById('input-category');
    sel.innerHTML = '<option value="" disabled selected>Catégorie…</option>';
    CATEGORIES[loc].forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.value; opt.textContent = c.label;
      sel.appendChild(opt);
    });
  }

  document.getElementById('input-location').addEventListener('change', (e) => populateCategorySelect(e.target.value));

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
    });
  });

  document.querySelectorAll('.loc-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeLocation = tab.dataset.loc;
      document.querySelectorAll('.loc-tab').forEach(t => t.classList.toggle('active', t.dataset.loc === activeLocation));
      populateCategorySelect(activeLocation);
      render();
    });
  });

  document.getElementById('search-input').addEventListener('input', (e) => {
    searchQuery = e.target.value.trim();
    render();
  });

  // Init
  populateCategorySelect('fridge');
</script>
