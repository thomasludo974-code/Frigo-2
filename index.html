<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Frigo Connecté</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e1117;
            --surface: #161b26;
            --border: #252d3d;
            --text: #e8ecf4;
            --accent: #5b8af0;
            --danger: #f76d7a;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { text-align: center; margin-bottom: 20px; font-weight: 800; }
        h1 span { color: var(--accent); }
        
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: white;
            font-size: 14px;
        }
        button {
            background: var(--accent);
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }

        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 35px; height: 35px; padding: 0; }
        .btn-del { background: var(--danger); width: auto; padding: 8px 12px; }
    </style>
</head>
<body>

    <h1>Mon <span>Frigo</span></h1>
    
    <div class="form-card">
        <input type="text" id="input-name" placeholder="Nom du produit (ex: Yaourt)">
        <input type="number" id="input-qty" value="1" min="1">
        <select id="input-loc">
            <option value="fridge">❄️ Frigo</option>
            <option value="pantry">📦 Placard</option>
        </select>
        <button id="btn-save">Ajouter au frigo</button>
    </div>

    <div id="product-list"></div>

    <script type="module">
        // Importation des modules Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Ta configuration Firebase (NE PAS TRADUIRE)
        const firebaseConfig = {
            apiKey: "AIzaSyCy7Csyy5KRJBiMbVER5E4knayzDuz4cso",
            authDomain: "frigo-bf9f2.firebaseapp.com",
            projectId: "frigo-bf9f2",
            storageBucket: "frigo-bf9f2.firebasestorage.app",
            messagingSenderId: "658029751960",
            appId: "1:658029751960:web:1fda5041c98cb042286aed"
        };

        // Initialisation
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // REFERENCE A LA COLLECTION (Bien vérifier la majuscule "Frigo")
        const frigoRef = collection(db, "Frigo");

        // FONCTION : AJOUTER UN PRODUIT
        document.getElementById('btn-save').onclick = async () => {
            const name = document.getElementById('input-name').value.trim();
            const qty = parseInt(document.getElementById('input-qty').value);
            const location = document.getElementById('input-loc').value;

            if (name !== "") {
                await addDoc(frigoRef, {
                    name: name,
                    qty: qty,
                    location: location
                });
                document.getElementById('input-name').value = "";
                document.getElementById('input-qty').value = "1";
            } else {
                alert("Donne un nom au produit !");
            }
        };

        // FONCTION : LIRE EN TEMPS RÉEL
        onSnapshot(frigoRef, (snapshot) => {
            const container = document.getElementById('product-list');
            container.innerHTML = ""; // On vide la liste avant de la recréer

            snapshot.forEach((docSnap) => {
                const item = docSnap.data();
                const id = docSnap.id;

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div>
                        <strong>${item.name}</strong><br>
                        <small>${item.location === 'fridge' ? '❄️ Frigo' : '📦 Placard'}</small>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="changeQty('${id}', ${item.qty - 1})">-</button>
                        <span>${item.qty}</span>
                        <button class="qty-btn" onclick="changeQty('${id}', ${item.qty + 1})">+</button>
                        <button class="btn-del" onclick="deleteItem('${id}')">🗑</button>
                    </div>
                `;
                container.appendChild(card);
            });
        });

        // FONCTION : MODIFIER QUANTITÉ
        window.changeQty = async (id, newQty) => {
            if (newQty <= 0) {
                deleteItem(id);
            } else {
                const itemRef = doc(db, "Frigo", id);
                await updateDoc(itemRef, { qty: newQty });
            }
        };

        // FONCTION : SUPPRIMER
        window.deleteItem = async (id) => {
            if (confirm("Supprimer ce produit ?")) {
                const itemRef = doc(db, "Frigo", id);
                await deleteDoc(itemRef);
            }
        };
    </script>
</body>
</html>
