<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Frigo Connecté</title>
    <style>
        :root { --bg: #0e1117; --surface: #161b26; --border: #252d3d; --text: #e8ecf4; --accent: #5b8af0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        input, select, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid var(--border); background: #0e1117; color: white; }
        button { background: var(--accent); cursor: pointer; font-weight: bold; }
        .qty-controls button { padding: 5px 10px; }
    </style>
</head>
<body>

    <h1>🧊 Mon Frigo</h1>
    
    <div style="background: var(--surface); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        <input type="text" id="name" placeholder="Nom du produit">
        <input type="number" id="qty" value="1">
        <select id="loc">
            <option value="fridge">Frigo</option>
            <option value="pantry">Placard</option>
        </select>
        <button id="addBtn">Ajouter</button>
    </div>

    <div id="list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCy7Csyy5KRJBiMbVER5E4knayzDuz4cso",
            authDomain: "frigo-bf9f2.firebaseapp.com",
            projectId: "frigo-bf9f2",
            storageBucket: "frigo-bf9f2.firebasestorage.app",
            messagingSenderId: "658029751960",
            appId: "1:658029751960:web:1fda5041c98cb042286aed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const frigoRef = collection(db, "frigo");

        // Ajouter
        document.getElementById('addBtn').onclick = async () => {
            const name = document.getElementById('name').value;
            const qty = parseInt(document.getElementById('qty').value);
            const location = document.getElementById('loc').value;
            if (name) {
                await addDoc(frigoRef, { name, qty, location });
                document.getElementById('name').value = '';
            }
        };

        // Lire en temps réel
        onSnapshot(frigoRef, (snapshot) => {
            const listEl = document.getElementById('list');
            listEl.innerHTML = '';
            snapshot.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                listEl.innerHTML += `
                    <div class="card">
                        <div>
                            <strong>${p.name}</strong> (${p.location === 'fridge' ? '❄️' : '📦'})
                        </div>
                        <div class="qty-controls">
                            <button onclick="updateQty('${id}', ${p.qty - 1})">-</button>
                            <span>${p.qty}</span>
                            <button onclick="updateQty('${id}', ${p.qty + 1})">+</button>
                            <button style="background:red" onclick="deleteItem('${id}')">🗑</button>
                        </div>
                    </div>
                `;
            });
        });

        window.updateQty = async (id, newQty) => {
            if (newQty <= 0) deleteItem(id);
            else await updateDoc(doc(db, "frigo", id), { qty: newQty });
        };

        window.deleteItem = async (id) => {
            if (confirm("Supprimer ?")) await deleteDoc(doc(db, "frigo", id));
        };
    </script>
</body>
</html>
